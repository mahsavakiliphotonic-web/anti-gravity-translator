<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Translator - EN/FI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voice Translator</h1>
            <div class="toggle-container">
                <span class="lang-label" id="label-left">English</span>
                <button id="toggle-btn" class="toggle-btn">
                    <div class="toggle-circle"></div>
                </button>
                <span class="lang-label" id="label-right">Finnish</span>
            </div>
        </header>

        <main>
            <div class="status-bar">
                <div id="status-indicator" class="indicator"></div>
                <span id="status-text">Click the microphone to start</span>
            </div>

            <div class="card-grid">
                <div class="card">
                    <div class="card-header">
                        <span id="input-lang-tag">EN</span>
                        <h3>Voice Input</h3>
                    </div>
                    <div id="input-text" class="text-display" placeholder="Speak now..."></div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span id="output-lang-tag">FI</span>
                        <h3>Translation</h3>
                    </div>
                    <div id="output-text" class="text-display translation" placeholder="Translation appears here..."></div>
                </div>
            </div>

            <div class="controls">
                <button id="mic-btn" class="mic-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
